version: 1

project:
  root: .
  build_config: lzc-build.yml
  package_file: package.yml
  output: dist/application.lpk
  target_arch: amd64

update:
  strategy: publish
  allow_downgrade: false
  version_source:
    type: image
    image: dokploy

build:
  toolchains: []
  run_buildscript: false

images:
  - id: dokploy
    target: service
    service: dokploy
    source: dokploy/dokploy
    channel: stable
    tag_regex: '^v[0-9]+\.[0-9]+\.[0-9]+$'
    version_regex: '^v(?P<version>[0-9]+\.[0-9]+\.[0-9]+)$'
    version_template: '{version}'
    delivery:
      mode: mirror
      image_template: docker.1ms.run/dokploy/dokploy:{tag}
      require_digest_match: true

stores:
  official:
    enabled: false
    skip_if_version_exists: false
    retry:
      enabled: false
  private:
    enabled: true
    skip_if_version_exists: true
    name: Dokploy
    summary: "Automatically published from GitHub Actions"
