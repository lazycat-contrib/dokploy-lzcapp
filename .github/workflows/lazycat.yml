name: Update and publish Dokploy LPK

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check the upstream image without committing, releasing, or publishing"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  lazycat:
    uses: ca-x/lazycat-github-action/.github/workflows/lazycat.yml@v1
    with:
      operation: auto
      config: .github/lazycat-action.yml
      dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
      versioned-release-asset: true
    secrets:
      APPSTORE_URL: ${{ secrets.APPSTORE_URL }}
      APPSTORE_TOKEN: ${{ secrets.APPSTORE_TOKEN }}
      APP_ID: ${{ secrets.APP_ID }}
      PRIVATE_STORE_GROUP_CODES: ${{ secrets.PRIVATE_STORE_GROUP_CODES }}
